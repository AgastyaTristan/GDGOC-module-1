<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pesan tiket World Tour Summer Festival 2026">
  <title>Book Ticket - World Tour Summer Festival 2026</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">World Tour Fest</a>
      <nav class="nav" aria-label="Navigasi utama">
        <ul class="nav-list">
          <li><a href="index.html#home" class="nav-link">Home</a></li>
          <li><a href="index.html#about" class="nav-link">About</a></li>
          <li><a href="index.html#date" class="nav-link">Date</a></li>
        </ul>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" type="button">
          <span class="theme-icon" aria-hidden="true">🌙</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="booking-main">
    <section class="section booking-section">
      <div class="container booking-container">
        <h1 class="section-title booking-title">Book Your Ticket</h1>
        <p class="booking-intro">
          Pilih kota dan jumlah tiket untuk World Tour Summer Festival 2026.
        </p>

        <form class="booking-form" action="#" method="post">
          <div class="form-group">
            <label for="city">Kota Konser</label>
            <select id="city" name="city" required>
              <option value="">— Pilih kota —</option>
              <option value="london">London, UK - 5 Juni 2026</option>
              <option value="paris">Paris, France - 12 Juni 2026</option>
              <option value="berlin">Berlin, Germany - 19 Juni 2026</option>
              <option value="madrid">Madrid, Spain - 26 Juni 2026</option>
              <option value="tokyo">Tokyo, Japan - 10 Juli 2026</option>
              <option value="seoul">Seoul, South Korea - 17 Juli 2026</option>
              <option value="sydney">Sydney, Australia - 24 Juli 2026</option>
              <option value="new-york">New York, USA - 7 Agustus 2026</option>
              <option value="los-angeles">Los Angeles, USA - 14 Agustus 2026</option>
              <option value="jakarta">Jakarta, Indonesia - 21 Agustus 2026</option>
            </select>
          </div>

          <div class="form-group">
            <label for="ticket-type">Tipe Tiket</label>
            <select id="ticket-type" name="ticket-type" required>
              <option value="">— Pilih tipe —</option>
              <option value="regular">Regular - $89</option>
              <option value="vip">VIP - $189</option>
              <option value="vvip">VVIP - $299</option>
            </select>
          </div>

          <div class="form-group">
            <label for="quantity">Jumlah Tiket</label>
            <input type="number" id="quantity" name="quantity" min="1" max="10" value="1" required>
          </div>

          <div class="form-group">
            <label for="name">Nama Lengkap</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required>
          </div>

          <button type="submit" class="btn btn-primary btn-full">Confirm Booking</button>
          <a href="index.html" class="btn btn-secondary btn-full">Back to Home</a>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <h2 class="footer-title">Contact</h2>
      <ul class="contact-list">
        <li>
          <a href="mailto:info@worldtoursummerfest.com" class="contact-link">info@worldtoursummerfest.com</a>
        </li>
        <li>
          <a href="https://instagram.com/worldtoursummerfest" class="contact-link" target="_blank" rel="noopener noreferrer">@worldtoursummerfest</a>
        </li>
        <li>
          <a href="https://wa.me/6281234567890" class="contact-link" target="_blank" rel="noopener noreferrer">+62 812-3456-7890</a>
        </li>
      </ul>
      <p class="footer-copy">&copy; 2026 World Tour Summer Festival. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const toggle = document.getElementById('theme-toggle');
    const icon = toggle.querySelector('.theme-icon');

    toggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      icon.textContent = isDark ? '☀️' : '🌙';
      toggle.setAttribute('aria-label', isDark ? 'Toggle light mode' : 'Toggle dark mode');
    });

    document.querySelector('.booking-form').addEventListener('submit', (e) => {
      e.preventDefault();
      window.location.href = 'index.html?booked=success';
    });

    const params = new URLSearchParams(window.location.search);
    const city = params.get('city');
    if (city) {
      const citySelect = document.getElementById('city');
      const option = citySelect.querySelector(`option[value="${city}"]`);
      if (option) citySelect.value = city;
    }
  </script>
</body>
</html>
